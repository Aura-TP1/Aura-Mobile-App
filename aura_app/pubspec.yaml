name: aura_app
description: Asistente visual para adultos mayores
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # ML/AI
  tflite_flutter: ^0.12.1
  
  # Cámara
  camera: ^0.10.5+5
  
  # Procesamiento imágenes
  image: ^4.1.3
  
  # Permisos
  permission_handler: ^11.0.1
  
  # Storage
  path_provider: ^2.1.1
  sqflite: ^2.3.0
  shared_preferences: ^2.2.2
  
  # Text-to-Speech
  flutter_tts: ^4.0.2
  
  # Speech-to-Text
  speech_to_text: ^6.6.0
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  

# CRÍTICO: Declarar los assets
flutter:
  uses-material-design: true
  
  assets:
    - assets/yolov8n_float32.tflite
    - assets/mobilenetv2_embeddings.tflite